<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <title>Calculator</title>
  </head>
  <body>
    <p>calculator</p>
    <div>
      <div class="calc-display"></div>
      <button class="calc-digit">1</button>
      <button class="calc-digit">2</button>
      <button class="calc-digit">3</button>
      <button class="calc-digit">4</button>
      <button class="calc-digit">5</button>
      <button class="calc-digit">6</button>
      <button class="calc-digit">7</button>
      <button class="calc-digit">8</button>
      <button class="calc-digit">9</button>
      <button class="calc-digit">0</button>
      <button class="operator">+</button>
      <button class="operator">-</button>
      <button class="operator">x</button>
      <button class="operator">/</button>
      <button class="operator">=</button>
      <button class="calc-digit">.</button>
      <button class="calc-digit">Clear</button>
      <button class="calc-digit">Del</button>
    </div>
  </body>
</html>
